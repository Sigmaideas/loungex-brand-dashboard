name: 리뷰 자동 수집

on:
  workflow_dispatch:  # 대시보드의 새로고침 버튼이 Cloudflare Worker 를 통해 트리거
  schedule:
    # 자정(00:00 UTC) 정각은 GitHub 예약 작업 혼잡으로 1~3시간 지연되기 쉬움.
    # 혼잡을 피해 23:40 UTC(= 08:40 KST)로 설정 → 지연돼도 대체로 오전 중 갱신.
    - cron: '40 23 * * *'

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4

      - name: Node.js 설정
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 의존성 설치
        run: npm ci

      - name: Playwright Chromium 설치
        run: npx playwright install --with-deps chromium

      - name: 네이버 누적 데이터 복원 (cache)
        uses: actions/cache@v4
        with:
          path: data/reviews.json
          key: naver-reviews-${{ github.run_id }}
          restore-keys: naver-reviews-

      - name: 구글 누적 데이터 복원 (cache)
        uses: actions/cache@v4
        with:
          path: data/reviews-google.json
          key: google-reviews-${{ github.run_id }}
          restore-keys: google-reviews-

      - name: 앱 누적 데이터 복원 (cache)
        uses: actions/cache@v4
        with:
          path: data/reviews-app.json
          key: app-reviews-${{ github.run_id }}
          restore-keys: app-reviews-

      - name: 네이버 수집 + 분석 + 자동 답글
        env:
          HEADLESS: 'true'
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}  # 없으면 답글은 기존 캐시만 적용
        run: npm run update

      - name: 구글 수집 + 분석 + 자동 답글
        env:
          GOOGLE_PLACES_API_KEY: ${{ secrets.GOOGLE_PLACES_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: npm run update:google
        continue-on-error: true  # 키 미설정 등 실패해도 네이버 결과는 살림

      - name: 앱(구글 플레이 + 애플 앱스토어) 수집 + 분석 + 자동 답글
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: npm run update:app
        continue-on-error: true  # 앱 수집 실패해도 나머지 결과는 살림

      - name: summary/답글 캐시 변경 시 커밋 + 푸시
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/summary.json data/summary-google.json data/summary-app.json
          git add data/reply-cache.json data/reply-cache-google.json data/reply-cache-app.json 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "변경사항 없음 — 커밋 생략"
          else
            git commit -m "데이터 자동 갱신 ($(TZ=Asia/Seoul date '+%Y-%m-%d %H:%M KST'))"
            git push
          fi
