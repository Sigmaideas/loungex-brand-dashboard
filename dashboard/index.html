<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="color-scheme" content="light only" />
  <title>LOUNGE'X 리뷰 모니터링</title>
  <link rel="preconnect" href="https://cdn.jsdelivr.net" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
  <link rel="stylesheet" href="style.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <script src="https://unpkg.com/lucide@0.469.0/dist/umd/lucide.min.js"></script>
</head>
<body>
  <aside class="sidebar">
    <div class="brand">
      <img class="brand-logo" src="logo.png" alt="LOUNGE'X" />
    </div>
    <nav class="nav">
      <div class="nav-section">데이터 소스</div>
      <a class="nav-item active" href="#" data-source="naver">
        <i data-lucide="message-square-text" class="nav-icon"></i>
        네이버 리뷰 모니터링
      </a>
      <a class="nav-item" href="#" data-source="google">
        <i data-lucide="globe" class="nav-icon"></i>
        구글 리뷰 모니터링
      </a>
      <a class="nav-item" href="#" data-source="app">
        <i data-lucide="smartphone" class="nav-icon"></i>
        라운지엑스앱 모니터링
      </a>
      <div class="nav-section">노출 분석</div>
      <a class="nav-item" href="#" data-source="rank">
        <i data-lucide="trending-up" class="nav-icon"></i>
        검색 순위
      </a>
    </nav>
    <div class="sidebar-foot">내부용 · v1.0</div>
  </aside>

  <div class="app">
    <header class="topbar">
      <div>
        <h1 id="pageTitle">네이버 플레이스 리뷰 모니터링</h1>
      </div>
      <div class="topbar-meta">
        <div class="topbar-meta-text">
          <span class="meta-value" id="lastUpdated">-</span>
        </div>
        <button
          class="refresh-btn"
          id="refreshBtn"
          title="네이버 플레이스에서 최신 리뷰를 다시 수집하고 분석합니다 (1~2분 소요)"
        >
          <i data-lucide="refresh-cw" class="btn-icon"></i>
          <span id="refreshLabel">데이터 업데이트</span>
        </button>
      </div>
    </header>

    <main>
     <div id="summaryView">
      <section class="kpi-row" id="kpiRow"><!-- render() 에서 소스별로 생성 --></section>

      <section class="card chart-card">
        <div class="card-head">
          <h2><i data-lucide="pie-chart" class="head-icon"></i><span id="donutTitle">매장별 리뷰 비중</span></h2>
          <span class="hint">전체 누적 기준</span>
        </div>
        <div class="chart-wrap"><canvas id="donut"></canvas></div>
      </section>

      <section class="card chart-card">
        <div class="card-head">
          <h2><i data-lucide="trending-up" class="head-icon"></i>월별 긍정 · 부정 리뷰</h2>
          <div class="card-head-actions">
            <select id="yearSelect" class="year-select" aria-label="연도 선택"></select>
          </div>
        </div>
        <div class="chart-wrap"><canvas id="monthly"></canvas></div>
      </section>

      <section class="card chart-card">
        <div class="card-head">
          <h2><i data-lucide="message-circle" class="head-icon"></i>리뷰 주요 단어</h2>
          <span class="hint">전체 리뷰 기준 · 자주 언급된 단어</span>
        </div>
        <div class="chart-wrap chart-wrap-tall"><canvas id="keywords"></canvas></div>
      </section>

      <section class="card" id="storeTableSection">
        <div class="card-head">
          <h2><i data-lucide="list" class="head-icon"></i><span id="tableTitle">매장별 상세</span></h2>
          <span class="hint" id="tableHint">컬럼 클릭 시 정렬 · 매장명 클릭 시 리뷰 상세</span>
        </div>
        <div class="table-wrap">
          <table id="storeTable">
            <thead>
              <tr>
                <th data-sort="name" id="nameHeader">매장명</th>
                <th data-sort="reviewCount">리뷰 수</th>
                <th data-sort="positiveRatio">긍정</th>
                <th data-sort="negativeRatio">부정</th>
                <th data-sort="monthlyActivity">월간 활성도</th>
                <th data-sort="latestReviewDate">최근 리뷰</th>
              </tr>
            </thead>
            <tbody></tbody>
          </table>
        </div>
      </section>
     </div>

     <div id="rankView" hidden>
      <section class="card">
        <div class="card-head">
          <h2><i data-lucide="trending-up" class="head-icon"></i>네이버 플레이스 검색 순위</h2>
          <span class="hint">매장별 키워드 검색 시 노출 순위 · 매일 추적</span>
        </div>
        <div id="rankBody"></div>
      </section>
     </div>
    </main>
  </div>

  <div class="modal" id="modal" hidden>
    <div class="modal-bg" data-close></div>
    <div class="modal-card">
      <button class="modal-close" data-close aria-label="닫기">&times;</button>
      <h3 id="modalTitle">매장 리뷰</h3>
      <div id="modalBody"></div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
